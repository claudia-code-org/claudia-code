<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1C1917"/>
  
  <!-- Terminal prompt chevron -->
  <path d="M120 180 L220 256 L120 332" 
        stroke="#A3E635" 
        stroke-width="40" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
  
  <!-- Pink cursor block -->
  <rect x="260" y="296" width="36" height="48" rx="4" fill="#F472B6">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
